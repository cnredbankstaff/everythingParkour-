<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">

  <script src="/_sdk/element_sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Bangers&display=swap');
    
    html, body { height: 100%; margin: 0; overflow: hidden; touch-action: none; }
    
    .pixel-font { font-family: 'Press Start 2P', monospace; font-size: clamp(8px, 2vw, 14px); }
    .banner-font { font-family: 'Bangers', cursive; }
    
    @media (max-width: 768px) {
      .pixel-font { font-size: clamp(6px, 1.5vw, 12px); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px currentColor; }
      50% { box-shadow: 0 0 40px currentColor, 0 0 60px currentColor; }
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .animate-float { animation: float 2s ease-in-out infinite; }
    .animate-pulse-glow { animation: pulse-glow 1s ease-in-out infinite; }
    .animate-spin-slow { animation: spin 3s linear infinite; }
    .animate-shake { animation: shake 0.3s ease-in-out infinite; }
    
    canvas { display: block; image-rendering: pixelated; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gray-900">
  <div id="game-container" class="h-full w-full relative overflow-hidden">
   <!-- Main Menu -->

   <div id="game-ui" class="absolute top-0 left-0 right-0 p-2 md:p-4 hidden z-40">

    </div><button id="jump-btn" class="bg-green-600/80 active:bg-green-500 text-white rounded-lg w-16 h-16 flex items-center justify-center text-2xl font-bold">⬆</button>
   </div><!-- Level Complete Overlay -->
   <div id="level-complete" class="absolute inset-0 hidden flex-col items-center justify-center z-50 bg-black/80 overflow-y-auto">

     <div class="text-6xl md:text-8xl mb-4">
      🎉
     </div>
     <h2 class="banner-font text-3xl md:text-5xl text-green-400 mb-4" style="text-shadow: 3px 3px 0 #000;">LEVEL COMPLETE!</h2>
     <p class="pixel-font text-white text-sm md:text-lg mb-6 md:mb-8" id="complete-message">Great job!</p>

     </div>
    </div>
   </div><!-- Game Complete -->
   <div id="game-complete" class="absolute inset-0 hidden flex-col items-center justify-center z-50 overflow-y-auto" style="background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 50%, #4ecdc4 100%);">
    <div class="text-center p-4">
     <div class="text-8xl md:text-9xl mb-4 animate-float">
      🏆
     </div>
     <h2 class="banner-font text-4xl md:text-6xl text-white mb-4" style="text-shadow: 4px 4px 0 #000;">YOU WIN!</h2>
     <p class="pixel-font text-white text-base md:text-xl mb-2">All 5 Levels!</p>
     <p class="pixel-font text-yellow-200 text-sm md:text-lg mb-6 md:mb-8" id="final-deaths">Total Deaths: 0</p><button onclick="showMainMenu()" class="pixel-font bg-white text-black px-8 md:px-12 py-3 md:py-4 text-sm md:text-base rounded-lg hover:bg-gray-200 active:scale-95"> PLAY AGAIN </button>
    </div>
   </div>
  </div>
  <script>
    // Audio Context for sound effects
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    
    function initAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
    }
    
    function playSound(type) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      switch(type) {
        case 'jump':
          osc.frequency.setValueAtTime(400, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.1);
          break;
        case 'death':
          osc.frequency.setValueAtTime(300, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.3);
          break;
        case 'complete':
          [523, 659, 784, 1047].forEach((freq, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.frequency.value = freq;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.15);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.15 + 0.3);
            o.start(audioCtx.currentTime + i * 0.15);
            o.stop(audioCtx.currentTime + i * 0.15 + 0.3);
          });
          break;
      }
    }
    
    // Game State
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    let gameRunning = false;
    let currentLevel = 1;
    let deaths = 0;
    let totalDeaths = 0;
    let animationId = null;
    
    // Player
    const player = {
      x: 50,
      y: 300,
      width: 36,
      height: 50,
      vx: 0,
      vy: 0,
      speed: 5,
      jumpForce: -14,
      gravity: 0.6,
      grounded: false,
      facingRight: true
    };
    
    // Input handling
    const keys = {};
    document.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'KeyW', 'KeyA', 'KeyS', 'KeyD'].includes(e.code)) {
        e.preventDefault();
      }
      if ((e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') && player.grounded && gameRunning) {
        player.vy = player.jumpForce;
        player.grounded = false;
        playSound('jump');
      }
    });
    document.addEventListener('keyup', (e) => keys[e.code] = false);
    
    // Mobile touch controls
    let touchStartX = 0;
    let touchStartY = 0;
    let jumpButtonPressed = false;
    
    document.addEventListener('touchstart', (e) => {
      if (!gameRunning) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      
      // Jump button area (bottom right)
      const jumpArea = document.getElementById('game-canvas');
      if (jumpArea && e.touches[0].clientY > jumpArea.offsetHeight - 80) {
        if (player.grounded && gameRunning) {
          player.vy = player.jumpForce;
          player.grounded = false;
          playSound('jump');
          jumpButtonPressed = true;
        }
      }
    }, { passive: true });
    
    document.addEventListener('touchmove', (e) => {
      if (!gameRunning) return;
      const touchX = e.touches[0].clientX;
      const deltaX = touchX - touchStartX;
      
      if (deltaX < -20) {
        keys['ArrowLeft'] = true;
        keys['ArrowRight'] = false;
      } else if (deltaX > 20) {
        keys['ArrowRight'] = true;
        keys['ArrowLeft'] = false;
      }
    }, { passive: true });
    
    document.addEventListener('touchend', (e) => {
      keys['ArrowLeft'] = false;
      keys['ArrowRight'] = false;
      jumpButtonPressed = false;
    }, { passive: true });
    
    // Level data
    let platforms = [];
    let hazards = [];
    let enemies = [];
    let movingPlatforms = [];
    let decorations = [];
    let goalX = 0;
    let levelTheme = {};
    let cameraX = 0;
    let autoRun = false;
    let levelWidth = 3000;
    
    // Level definitions
    function loadLevel(level) {
      platforms = [];
      hazards = [];
      enemies = [];
      movingPlatforms = [];
      decorations = [];
      autoRun = false;
      cameraX = 0;
      
      player.x = 50;
      player.y = 300;
      player.vx = 0;
      player.vy = 0;
      player.grounded = false;
      
      switch(level) {
        case 1: loadMinecraftLevel(); break;
        case 2: loadRobloxLevel(); break;
        case 3: loadGeometryDashLevel(); break;
        case 4: loadMarioLevel(); break;
        case 5: loadBrainrotLevel(); break;
      }
      
      document.getElementById('level-display').textContent = `LEVEL ${level}`;
    }
    
    // Level 1: Minecraft
    function loadMinecraftLevel() {
      levelTheme = {
        bg1: '#87CEEB',
        bg2: '#5BA3D9',
        name: 'MINECRAFT'
      };
      levelWidth = 3500;
      goalX = 3300;
      
      // Ground start
      platforms.push({ x: 0, y: 450, w: 200, h: 50, type: 'grass' });
      
      // Floating platforms
      const positions = [
        { x: 250, y: 400 }, { x: 400, y: 350 }, { x: 550, y: 300 },
        { x: 750, y: 350 }, { x: 900, y: 280 }, { x: 1100, y: 320 },
        { x: 1300, y: 260 }, { x: 1500, y: 300 }, { x: 1700, y: 350 },
        { x: 1850, y: 280 }, { x: 2050, y: 230 }, { x: 2250, y: 280 },
        { x: 2450, y: 320 }, { x: 2650, y: 260 }, { x: 2850, y: 300 },
        { x: 3050, y: 350 }, { x: 3200, y: 400 }
      ];
      
      positions.forEach((pos, i) => {
        const types = ['grass', 'dirt', 'stone'];
        platforms.push({
          x: pos.x, y: pos.y,
          w: 80 + Math.random() * 40,
          h: 40,
          type: types[i % 3]
        });
      });
      
      // Decorations (trees, clouds)
      for (let i = 0; i < 8; i++) {
        decorations.push({ x: 300 + i * 400, y: 50, type: 'cloud' });
      }
    }
    
    // Level 2: Roblox Obby
    function loadRobloxLevel() {
      levelTheme = {
        bg1: '#1a1a2e',
        bg2: '#16213e',
        name: 'ROBLOX OBBY'
      };
      levelWidth = 3500;
      goalX = 3300;
      
      // Neon platforms
      const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3', '#f38181'];
      
      platforms.push({ x: 0, y: 450, w: 150, h: 30, type: 'neon', color: colors[0] });
      
      const platformData = [
        { x: 200, y: 400 }, { x: 350, y: 350 }, { x: 520, y: 380 },
        { x: 700, y: 320 }, { x: 900, y: 280 }, { x: 1100, y: 350 },
        { x: 1300, y: 300 }, { x: 1500, y: 250 }, { x: 1700, y: 320 },
        { x: 1900, y: 280 }, { x: 2100, y: 350 }, { x: 2300, y: 300 },
        { x: 2500, y: 250 }, { x: 2700, y: 320 }, { x: 2900, y: 280 },
        { x: 3100, y: 350 }, { x: 3250, y: 400 }
      ];
      
      platformData.forEach((pos, i) => {
        platforms.push({
          x: pos.x, y: pos.y,
          w: 70 + Math.random() * 30,
          h: 25,
          type: 'neon',
          color: colors[i % colors.length]
        });
      });
      
      // Kill bricks (spinning)
      hazards.push({ x: 450, y: 300, w: 40, h: 40, type: 'killbrick', spin: true });
      hazards.push({ x: 800, y: 250, w: 40, h: 40, type: 'killbrick', spin: true });
      hazards.push({ x: 1200, y: 280, w: 40, h: 40, type: 'killbrick', spin: true });
      hazards.push({ x: 1600, y: 220, w: 40, h: 40, type: 'killbrick', spin: true });
      hazards.push({ x: 2000, y: 250, w: 40, h: 40, type: 'killbrick', spin: true });
      hazards.push({ x: 2400, y: 220, w: 40, h: 40, type: 'killbrick', spin: true });
      hazards.push({ x: 2800, y: 250, w: 40, h: 40, type: 'killbrick', spin: true });
      
      // Moving platforms
      movingPlatforms.push({ x: 600, y: 350, w: 80, h: 25, dx: 100, speed: 2, color: '#4ecdc4' });
      movingPlatforms.push({ x: 1400, y: 300, w: 80, h: 25, dx: 120, speed: 2.5, color: '#ffe66d' });
      movingPlatforms.push({ x: 2200, y: 280, w: 80, h: 25, dx: 100, speed: 3, color: '#f38181' });
    }
    
    // Level 3: Geometry Dash
    function loadGeometryDashLevel() {
      levelTheme = {
        bg1: '#0a0a0a',
        bg2: '#1a0a2e',
        name: 'GEOMETRY DASH'
      };
      levelWidth = 3500;
      goalX = 3300;
      player.speed = 6;
      
      // Ground with gaps
      const groundSections = [
        { x: 0, w: 300 }, { x: 400, w: 200 }, { x: 700, w: 250 },
        { x: 1050, w: 200 }, { x: 1350, w: 300 }, { x: 1750, w: 200 },
        { x: 2050, w: 250 }, { x: 2400, w: 200 }, { x: 2700, w: 300 },
        { x: 3100, w: 400 }
      ];
      
      groundSections.forEach(s => {
        platforms.push({ x: s.x, y: 450, w: s.w, h: 50, type: 'gd', color: '#00ffff' });
      });
      
      // Floating platforms
      platforms.push({ x: 320, y: 380, w: 60, h: 20, type: 'gd', color: '#ff00ff' });
      platforms.push({ x: 620, y: 350, w: 60, h: 20, type: 'gd', color: '#ff00ff' });
      platforms.push({ x: 970, y: 380, w: 60, h: 20, type: 'gd', color: '#ff00ff' });
      platforms.push({ x: 1270, y: 350, w: 60, h: 20, type: 'gd', color: '#ff00ff' });
      platforms.push({ x: 1670, y: 380, w: 60, h: 20, type: 'gd', color: '#ff00ff' });
      platforms.push({ x: 1970, y: 350, w: 60, h: 20, type: 'gd', color: '#ff00ff' });
      platforms.push({ x: 2320, y: 380, w: 60, h: 20, type: 'gd', color: '#ff00ff' });
      platforms.push({ x: 2620, y: 350, w: 60, h: 20, type: 'gd', color: '#ff00ff' });
      platforms.push({ x: 3020, y: 380, w: 60, h: 20, type: 'gd', color: '#ff00ff' });
      
      // Spikes
      const spikePositions = [200, 500, 850, 1150, 1550, 1850, 2200, 2500, 2900];
      spikePositions.forEach(x => {
        hazards.push({ x: x, y: 420, w: 30, h: 30, type: 'spike' });
      });
    }
    
    // Level 4: Mario
    function loadMarioLevel() {
      levelTheme = {
        bg1: '#5c94fc',
        bg2: '#3c74dc',
        name: 'SUPER MARIO'
      };
      levelWidth = 3500;
      goalX = 3300;
      player.speed = 5;

    // Rendering
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Background gradient
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, levelTheme.bg1);
      grad.addColorStop(1, levelTheme.bg2);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Level-specific backgrounds
      if (currentLevel === 1) renderMinecraftBg();
      if (currentLevel === 3) renderGDBg();
      if (currentLevel === 5) renderBrainrotBg();
      
      ctx.save();
      ctx.translate(-cameraX, 0);
      
      // Decorations behind
      decorations.forEach(d => renderDecoration(d));
      
      // Platforms
      platforms.forEach(p => renderPlatform(p));
      
      // Moving platforms
      movingPlatforms.forEach(mp => {
        ctx.fillStyle = mp.color || '#4ecdc4';
        ctx.shadowColor = mp.color || '#4ecdc4';
        ctx.shadowBlur = 15;
        ctx.fillRect(mp.x, mp.y, mp.w, mp.h);
        ctx.shadowBlur = 0;
      });
      
      // Hazards
      hazards.forEach(h => renderHazard(h));
      
      // Enemies
      enemies.forEach(e => renderEnemy(e));
      
      // Goal
      renderGoal();
      
      // Player
      renderPlayer();
      
      ctx.restore();
      
      // Level name overlay
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(canvas.width / 2 - 100, 10, 200, 30);
      ctx.fillStyle = '#fff';
      ctx.font = '12px "Press Start 2P"';
      ctx.textAlign = 'center';
      ctx.fillText(levelTheme.name, canvas.width / 2, 30);
    }
    
    function renderMinecraftBg() {
      // Square clouds
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 5; i++) {
        const x = ((i * 300 - cameraX * 0.3) % (canvas.width + 200)) - 100;
        ctx.fillRect(x, 50 + i * 20, 80, 30);
        ctx.fillRect(x + 20, 35 + i * 20, 50, 20);
      }
    }
    
    function renderGDBg() {
      // Pulsing grid
      const time = Date.now() / 1000;
      ctx.strokeStyle = `rgba(0, 255, 255, ${0.1 + Math.sin(time * 2) * 0.05})`;
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.width; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 50) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }
    
    function renderBrainrotBg() {
      // Chaotic background elements
      const time = Date.now() / 500;
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.font = '40px Arial';
      decorations.forEach((d, i) => {
        const x = (d.x - cameraX * 0.5 + Math.sin(time + i) * 20) % (canvas.width + 100);
        const y = d.y + Math.cos(time + i) * 10;
        ctx.fillText(d.emoji, x, y);
      });
      ctx.restore();
    }
    
    function renderPlatform(p) {
      ctx.save();
      
      switch(p.type) {
        case 'grass':
          ctx.fillStyle = '#8B4513';
          ctx.fillRect(p.x, p.y, p.w, p.h);
          ctx.fillStyle = '#228B22';
          ctx.fillRect(p.x, p.y, p.w, 10);
          // Grass detail
          ctx.fillStyle = '#32CD32';
          for (let i = 0; i < p.w; i += 8) {
            ctx.fillRect(p.x + i, p.y - 2, 4, 4);
          }
          break;
          
        case 'dirt':
          ctx.fillStyle = '#8B4513';
          ctx.fillRect(p.x, p.y, p.w, p.h);
          // Dirt spots
          ctx.fillStyle = '#654321';
          for (let i = 0; i < 3; i++) {
            ctx.fillRect(p.x + 10 + i * 20, p.y + 15, 8, 8);
          }
          break;
          
        case 'stone':
          ctx.fillStyle = '#808080';
          ctx.fillRect(p.x, p.y, p.w, p.h);
          // Stone cracks
          ctx.strokeStyle = '#606060';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(p.x + 10, p.y + 10);
          ctx.lineTo(p.x + 30, p.y + 25);
          ctx.stroke();
          break;
          
        case 'neon':
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 20;
          ctx.fillRect(p.x, p.y, p.w, p.h);
          ctx.shadowBlur = 0;
          // Highlight
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.fillRect(p.x, p.y, p.w, 5);
          break;
          
        case 'gd':
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 15;
          ctx.fillRect(p.x, p.y, p.w, p.h);
          ctx.shadowBlur = 0;
          break;
          
        case 'mario-ground':
          ctx.fillStyle = '#c84c0c';
          ctx.fillRect(p.x, p.y, p.w, p.h);
          // Brick pattern
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 2;
          for (let i = 0; i < p.w; i += 40) {
            ctx.strokeRect(p.x + i, p.y, 40, 25);
          }
          break;
          
        case 'brick':
          ctx.fillStyle = '#c84c0c';
          ctx.fillRect(p.x, p.y, p.w, p.h);
          ctx.strokeStyle = '#8B0000';
          ctx.lineWidth = 2;
          ctx.strokeRect(p.x, p.y, p.w, p.h);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y + p.h / 2);
          ctx.lineTo(p.x + p.w, p.y + p.h / 2);
          ctx.stroke();
          break;
          
        case 'question':
          ctx.fillStyle = '#FFD700';
          ctx.fillRect(p.x, p.y, p.w, p.h);
          ctx.strokeStyle = '#B8860B';
          ctx.lineWidth = 3;
          ctx.strokeRect(p.x, p.y, p.w, p.h);
          // Question mark
          ctx.fillStyle = '#8B4513';
          ctx.font = 'bold 24px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('?', p.x + p.w / 2, p.y + p.h - 10);
          break;
          
        case 'brainrot':
          const brainGrad = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y + p.h);
          brainGrad.addColorStop(0, '#ff6b6b');
          brainGrad.addColorStop(0.5, '#ffd93d');
          brainGrad.addColorStop(1, '#6bcb77');
          ctx.fillStyle = brainGrad;
          ctx.fillRect(p.x, p.y, p.w, p.h);
          break;
      }
      
      ctx.restore();
    }
    
    function renderHazard(h) {
      ctx.save();
      const time = Date.now() / 1000;
      
      switch(h.type) {
        case 'killbrick':
          ctx.translate(h.x + h.w / 2, h.y + h.h / 2);
          ctx.rotate(time * 3);
          ctx.fillStyle = '#ff0000';
          ctx.shadowColor = '#ff0000';
          ctx.shadowBlur = 20;
          ctx.fillRect(-h.w / 2, -h.h / 2, h.w, h.h);
          break;
          
        case 'spike':
          ctx.fillStyle = '#333';
          ctx.shadowColor = '#ff00ff';
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.moveTo(h.x, h.y + h.h);
          ctx.lineTo(h.x + h.w / 2, h.y);
          ctx.lineTo(h.x + h.w, h.y + h.h);
          ctx.closePath();
          ctx.fill();
          break;
          
        case 'brainrot-obstacle':
          ctx.font = '40px Arial';
          ctx.textAlign = 'center';
          ctx.fillText(h.emoji, h.x + h.w / 2, h.y + h.h);
          break;
      }
      
      ctx.restore();
    }
    
    function renderEnemy(e) {
      ctx.save();
      
      if (e.type === 'goomba') {
        // Body
        ctx.fillStyle = '#8B4513';
        ctx.beginPath();
        ctx.ellipse(e.x + e.w / 2, e.y + e.h / 2, e.w / 2, e.h / 2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Feet
        ctx.fillStyle = '#654321';
        ctx.fillRect(e.x + 2, e.y + e.h - 8, 10, 8);
        ctx.fillRect(e.x + e.w - 12, e.y + e.h - 8, 10, 8);
        
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(e.x + e.w * 0.35, e.y + e.h * 0.3, 5, 0, Math.PI * 2);
        ctx.arc(e.x + e.w * 0.65, e.y + e.h * 0.3, 5, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(e.x + e.w * 0.35, e.y + e.h * 0.3, 2, 0, Math.PI * 2);
        ctx.arc(e.x + e.w * 0.65, e.y + e.h * 0.3, 2, 0, Math.PI * 2);
        ctx.fill();
        
        // Angry eyebrows
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(e.x + 5, e.y + 5);
        ctx.lineTo(e.x + 15, e.y + 8);
        ctx.moveTo(e.x + e.w - 5, e.y + 5);
        ctx.lineTo(e.x + e.w - 15, e.y + 8);
        ctx.stroke();
      }
      
      ctx.restore();
    }
    
    function renderGoal() {
      const time = Date.now() / 500;
      ctx.save();
      
      // Goal flag pole
      ctx.fillStyle = '#654321';
      ctx.fillRect(goalX + 20, 250, 10, 200);
      
      // Flag
      ctx.fillStyle = `hsl(${(time * 50) % 360}, 70%, 50%)`;
      ctx.beginPath();
      ctx.moveTo(goalX + 30, 260);
      ctx.lineTo(goalX + 100, 290);
      ctx.lineTo(goalX + 30, 320);
      ctx.closePath();
      ctx.fill();
      
      // Star
      ctx.fillStyle = '#FFD700';
      ctx.font = '30px Arial';
      ctx.fillText('⭐', goalX + 10, 250);
      
      ctx.restore();
    }
    
    function renderDecoration(d) {
      if (d.type === 'cloud') {
        ctx.fillStyle = '#fff';
        ctx.fillRect(d.x, d.y, 60, 30);
        ctx.fillRect(d.x + 10, d.y - 15, 40, 20);
      }
    }
    
    function renderPlayer() {
      ctx.save();
      ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
      if (!player.facingRight) ctx.scale(-1, 1);
      ctx.translate(-player.width / 2, -player.height / 2);
      
      // Lincoln Hat
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(5, -12, 26, 22);
      ctx.fillRect(2, 8, 32, 5);
      ctx.fillStyle = '#2d2d2d';
      ctx.fillRect(8, 5, 20, 3);
      
      // Green Block Body
      ctx.fillStyle = '#22c55e';
      ctx.beginPath();
      ctx.roundRect(2, 12, 32, 32, 3);
      ctx.fill();
      
      ctx.fillStyle = '#16a34a';
      ctx.beginPath();
      ctx.roundRect(4, 14, 28, 28, 2);
      ctx.fill();
      
      // Eyes
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(12, 24, 5, 6, 0, 0, Math.PI * 2);
      ctx.ellipse(24, 24, 5, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#3b82f6';
      ctx.beginPath();
      ctx.arc(13, 25, 3.5, 0, Math.PI * 2);
      ctx.arc(25, 25, 3.5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(14, 24, 1.5, 0, Math.PI * 2);
      ctx.arc(26, 24, 1.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Smile
      ctx.strokeStyle = '#065f46';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(18, 32, 6, 0.2, Math.PI - 0.2);
      ctx.stroke();
      
      ctx.restore();
    }
    
    // Physics & Update
    function update() {
      // Input
      if (autoRun) {
        player.vx = player.speed;
      } else {
        if (keys['ArrowLeft'] || keys['KeyA']) {
          player.vx = -player.speed;
          player.facingRight = false;
        } else if (keys['ArrowRight'] || keys['KeyD']) {
          player.vx = player.speed;
          player.facingRight = true;
        } else {
          player.vx = 0;
        }
      }
      
      // Gravity
      player.vy += player.gravity;
      if (player.vy > 15) player.vy = 15;
      
      // Move X
      player.x += player.vx;
      
      // Collision X
      let onMovingPlatform = false;
      
      platforms.forEach(p => {
        if (rectCollide(player, p)) {
          if (player.vx > 0) player.x = p.x - player.width;
          else if (player.vx < 0) player.x = p.x + p.w;
        }
      });
      
      // Move Y
      player.y += player.vy;
      player.grounded = false;
      
      // Collision Y with static platforms
      platforms.forEach(p => {
        if (rectCollide(player, p)) {
          if (player.vy > 0) {
            player.y = p.y - player.height;
            player.vy = 0;
            player.grounded = true;
          } else if (player.vy < 0) {
            player.y = p.y + p.h;
            player.vy = 0;
          }
        }
      });
      
      // Moving platforms
      movingPlatforms.forEach(mp => {
        mp.x += mp.speed;
        if (mp.x > mp.startX + mp.dx || mp.x < mp.startX - mp.dx) {
          mp.speed *= -1;
        }
        mp.startX = mp.startX || mp.x;
        
        if (rectCollide(player, mp)) {
          if (player.vy > 0) {
            player.y = mp.y - player.height;
            player.vy = 0;
            player.grounded = true;
            player.x += mp.speed;
            onMovingPlatform = true;
          }
        }
      });
      
      // Hazard collision
      hazards.forEach(h => {
        if (rectCollide(player, h)) {
          die();
        }
      });
      
      // Enemy collision
      enemies.forEach(e => {
        e.x += e.vx;
        if (e.x < e.startX || e.x > e.endX) e.vx *= -1;
        
        if (rectCollide(player, e)) {
          die();
        }
      });
      
      // Fall death
      if (player.y > 600) {
        die();
      }
      
      // Bounds
      if (player.x < 0) player.x = 0;
      if (player.x > levelWidth - player.width) player.x = levelWidth - player.width;
      
      // Camera follow
      const targetCam = player.x - canvas.width / 3;
      cameraX += (targetCam - cameraX) * 0.1;
      if (cameraX < 0) cameraX = 0;
      if (cameraX > levelWidth - canvas.width) cameraX = levelWidth - canvas.width;
      
      // Check goal
      if (player.x + player.width > goalX) {
        completeLevel();
      }
    }
    
    function rectCollide(a, b) {
      return a.x < b.x + b.w &&
             a.x + a.width > b.x &&
             a.y < b.y + b.h &&
             a.y + a.height > b.y;
    }
    
    function die() {
      deaths++;
      totalDeaths++;
      document.getElementById('deaths-display').textContent = `DEATHS: ${deaths}`;
      playSound('death');
      loadLevel(currentLevel);
    }
    
    function completeLevel() {
      gameRunning = false;
      playSound('complete');
      
      if (currentLevel >= 5) {
        document.getElementById('final-deaths').textContent = `Total Deaths: ${totalDeaths}`;
        document.getElementById('game-complete').classList.remove('hidden');
        document.getElementById('game-complete').classList.add('flex');
      } else {
        document.getElementById('complete-message').textContent = `Deaths this level: ${deaths}`;
        document.getElementById('level-complete').classList.remove('hidden');
        document.getElementById('level-complete').classList.add('flex');
      }
    }
    
    function gameLoop() {
      if (!gameRunning) return;
      update();
      render();
      animationId = requestAnimationFrame(gameLoop);
    }

      document.getElementById('deaths-display').textContent = `DEATHS: ${deaths}`;
      loadLevel(currentLevel);
    }
    
    function nextLevel() {
